{% extends 'dashboard/base.html' %}
{% block dashboard_title %}{{ title }}{% endblock %}
{% block dashboard_content %}
<section class="dashboard-panel dashboard-form-panel">
	<form method="post" enctype="multipart/form-data">
		{% csrf_token %}
		{% include 'dashboard/form_fields.html' %}
		<div class="dashboard-form-actions">
			<button class="dashboard-button" type="submit">Save Service</button>
			<a class="dashboard-button dashboard-button-secondary" href="{% url 'dashboard_services' %}">Cancel</a>
		</div>
	</form>
</section>
{% endblock %}
