{% for field in form %}
<div class="dashboard-field">
	<label for="{{ field.id_for_label }}">{{ field.label }}</label>
	{{ field }}
	{% if field.help_text %}
	<small>{{ field.help_text }}</small>
	{% endif %}
	{% for error in field.errors %}
	<span class="dashboard-error">{{ error }}</span>
	{% endfor %}
</div>
{% endfor %}
{% if form.non_field_errors %}
<div class="dashboard-error">{{ form.non_field_errors }}</div>
{% endif %}
